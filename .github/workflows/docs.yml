name: "📚 Documentation Builder"

# Allow one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
        - main
        - zensical
    paths:
      - .github/workflows/docs.yml
      - pum/**/*.py
      - docs/**/*
    tags:
      - "*"

  release:
    types: [published, edited, deleted]

  # pull_request:
  #   branches:
  #       - main
  #   paths:
  #     - .github/workflows/docs.yml
  #     - pum/**/*.py
  #     - docs/**/*

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:

    runs-on: ubuntu-latest

    steps:
    - name: Get source code
      uses: actions/checkout@v7

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install -r requirements/base.txt
        python -m pip install -r docs/requirements.txt

    - name: Install pum
      run: python -m pip install .

    - name: Update CLI docs
      run: ./docs/update_cli_docs.py

    - name: Update changelog docs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ./docs/update_changelog_docs.py

    - name: Build documentation
      run: zensical build -f docs/mkdocs.yml --strict

    - uses: actions/upload-pages-artifact@v5
      with:
        path: docs/site

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    # For release events, ref_type is 'tag' as well, but we do want to deploy
    # them (the changelog page is generated from the GitHub releases).
    if: ${{ github.event_name != 'pull_request' && (github.event_name == 'release' || github.ref_type != 'tag') }}
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
